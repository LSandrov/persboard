version: "3.9"

services:
  postgres:
    image: postgres:18-alpine
    container_name: persboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: persboard
      POSTGRES_USER: persboard
      POSTGRES_PASSWORD: persboard
    volumes:
      # Mount the volume to the new default location for PG18+
      - ./.docker/postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: persboard-backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-persboard}
      DB_USER: ${DB_USER:-persboard}
      DB_PASSWORD: ${DB_PASSWORD:-persboard}
      DB_SSLMODE: ${DB_SSLMODE:-disable}

      # EazyBI + calendar metrics integration
      EAZYBI_BASE_URL: ${EAZYBI_BASE_URL:-}
      EAZYBI_EXPORT_PREFIX: ${EAZYBI_EXPORT_PREFIX:-}
      EAZYBI_ACCOUNT_ID: ${EAZYBI_ACCOUNT_ID:-}
      EAZYBI_AUTH_MODE: ${EAZYBI_AUTH_MODE:-}
      EAZYBI_USERNAME: ${EAZYBI_USERNAME:-}
      EAZYBI_PASSWORD: ${EAZYBI_PASSWORD:-}
      EAZYBI_EMBED_TOKEN: ${EAZYBI_EMBED_TOKEN:-}
      EAZYBI_ALLOWED_HOSTS: ${EAZYBI_ALLOWED_HOSTS:-}
      CALENDAR_METRICS_JSON: ${CALENDAR_METRICS_JSON:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: persboard-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

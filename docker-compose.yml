version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: persboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: persboard
      POSTGRES_USER: persboard
      POSTGRES_PASSWORD: persboard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persboard -d persboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: persboard-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      CORS_ORIGIN: http://localhost:5173
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: persboard
      DB_USER: persboard
      DB_PASSWORD: persboard
      DB_SSLMODE: disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: persboard-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
